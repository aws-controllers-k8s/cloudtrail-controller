ignore:
  field_paths: null
  operations: null
  resource_names: null
  shape_names: null
model_name: cloudtrail
operations: {}
prefix_config: {}
resources:
  Trail:
    fields:
      Name:
        is_immutable: true
    renames:
      operations:
        CreateTrail:
          input_fields:
            TagsList: Tags
    hooks:
      sdk_read_one_post_set_output:
        template_path: hooks/trail/sdk_read_one_post_set_output.go.tpl
    update_operation:
      custom_method_name: customUpdateTrail
    exceptions:
      errors:
        404:
          code: TrailNotFoundException
      terminal_codes:
        - InvalidParameterCombination
        - InvalidParameterValue
        - InvalidQueryParameter
        - MissingAction
        - MissingParameter
  EventDataStore:
    is_arn_primary_key: true
    renames:
      operations:
        GetEventDataStore:
          input_fields:
            EventDataStore: Name
        CreateEventDataStore:
          input_fields:
            TagsList: Tags
    hooks:
      delta_pre_compare:
        code: customPreCompare(delta, a, b)
      sdk_read_one_post_set_output:
        template_path: hooks/event_data_store/sdk_read_one_post_set_output.go.tpl
      sdk_read_one_post_build_request:
        template_path: hooks/event_data_store/sdk_set_event_data_store_id.go.tpl
      sdk_delete_post_build_request:
        template_path: hooks/event_data_store/sdk_set_event_data_store_id.go.tpl
    update_operation:
      custom_method_name: customUpdateEventDataStore